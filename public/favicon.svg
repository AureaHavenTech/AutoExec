<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b87a"/>
      <stop offset="50%" style="stop-color:#c4a055"/>
      <stop offset="100%" style="stop-color:#a88640"/>
    </linearGradient>
    <linearGradient id="gold-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ebe0cc"/>
      <stop offset="50%" style="stop-color:#d4b87a"/>
      <stop offset="100%" style="stop-color:#c4a055"/>
    </linearGradient>
  </defs>
  <!-- Dark gray background -->
  <rect width="64" height="64" rx="12" ry="12" fill="#1a1a24"/>
  <!-- Outer ring of steering wheel -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#gold)" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- Inner ring detail -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.3"/>
  <!-- Center hub -->
  <circle cx="32" cy="32" r="6" fill="url(#gold)" opacity="0.9"/>
  <!-- Spokes -->
  <line x1="32" y1="10" x2="32" y2="20" stroke="url(#gold-light)" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="26" x2="44" y2="30" stroke="url(#gold-light)" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="52" y1="38" x2="44" y2="34" stroke="url(#gold-light)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Top opening of steering wheel -->
  <path d="M 32 10 Q 48 10 52 26" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
  <!-- Bottom spoke -->
  <line x1="32" y1="54" x2="32" y2="44" stroke="url(#gold-light)" stroke-width="3" stroke-linecap="round"/>
  <!-- Gold accent dots -->
  <circle cx="32" cy="9" r="2" fill="#d4b87a" opacity="0.8"/>
  <!-- Center diamond -->
  <polygon points="32,27 35,32 32,37 29,32" fill="url(#gold-light)" opacity="0.4"/>
</svg>