<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8883a" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#f5e6a3" />
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a3a" />
      <stop offset="100%" stop-color="#1a1a2a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark circle background -->
  <circle cx="36" cy="36" r="34" fill="url(#darkGrad)" stroke="url(#goldGrad)" stroke-width="2" />
  
  <!-- Bold gold A monogram - luxury brand energy -->
  <text x="36" y="50" font-family="'Playfair Display', Georgia, serif" font-size="48" font-weight="700" fill="url(#goldGrad)" text-anchor="middle" filter="url(#glow)">A</text>
  
  <!-- Small steering wheel accent integrated into the A -->
  <circle cx="36" cy="28" r="7" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="36" cy="28" r="2" fill="url(#goldGrad)" opacity="0.8"/>
  <line x1="36" y1="21" x2="36" y2="24" stroke="url(#goldGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="43" y1="25" x2="40" y2="27" stroke="url(#goldGrad)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="43" y1="31" x2="40" y2="29" stroke="url(#goldGrad)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>