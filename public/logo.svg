<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="100%" height="100%">
  <defs>
    <!-- Premium Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8883a" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#f5e6a3" />
    </linearGradient>
    <!-- Dark gradient for the wheel icon -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a3a" />
      <stop offset="100%" stop-color="#1a1a2a" />
    </linearGradient>
    <!-- Subtle glow for the gear -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle - dark gray -->
  <circle cx="36" cy="40" r="32" fill="url(#darkGrad)" stroke="url(#goldGrad)" stroke-width="1.5" />

  <!-- Steering wheel / axle icon - outer ring -->
  <circle cx="36" cy="40" r="16" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" />
  
  <!-- Steering wheel / axle icon - inner hub -->
  <circle cx="36" cy="40" r="5" fill="url(#goldGrad)" opacity="0.9" />
  
  <!-- Steering wheel spokes -->
  <line x1="36" y1="26" x2="36" y2="32" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
  <line x1="36" y1="48" x2="36" y2="54" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
  <line x1="22" y1="40" x2="28" y2="40" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
  <line x1="44" y1="40" x2="50" y2="40" stroke="url(#goldGrad)" stroke-width="2" stroke-linecap="round" />
  
  <!-- Diagonal spokes -->
  <line x1="26.1" y1="30.1" x2="30.2" y2="34.2" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="45.9" y1="49.9" x2="41.8" y2="45.8" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="45.9" y1="30.1" x2="41.8" y2="34.2" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="26.1" y1="49.9" x2="30.2" y2="45.8" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" />

  <!-- Brand name - Axel -->
  <text x="82" y="36" font-family="'Playfair Display', Georgia, serif" font-size="28" font-weight="700" fill="#e8e0d4" letter-spacing="3">AXEL</text>
  
  <!-- Tagline - AI -->
  <text x="82" y="60" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="300" fill="url(#goldGrad)" letter-spacing="8">AI</text>

  <!-- Small decorative gold dot -->
  <circle cx="192" cy="36" r="2" fill="url(#goldGrad)" opacity="0.5" />
</svg>
